name: bridge_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  audioplayers: ^6.1.0
  dio: ^5.9.0
  drift: ^2.22.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  get: ^4.7.3
  path: ^1.9.1
  path_provider: ^2.1.5
  record: ^6.0.0
  shared_preferences: ^2.5.4
  sqlite3_flutter_libs: ^0.5.0
  uuid: ^4.5.1
dev_dependencies:
  build_runner: ^2.4.14
  drift_dev: ^2.22.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon_old_english_sheepdog.png
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/images/app_icon_old_english_sheepdog.png
    background_color: "#2C657A"
    theme_color: "#2C657A"
  windows:
    generate: true
    image_path: assets/images/app_icon_old_english_sheepdog.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/images/app_icon_old_english_sheepdog.png
